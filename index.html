<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Tienda</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!----HEADER DE LA TIENDA---->
    <header>
        <div class="header-container">
            <h1 class="header-title">Mini tienda</h1>
            <p class="header-subtitle">¡Tu tienda de confianza!</p>
        </div>
    </header>

    <!-----MAIN DE LA TIENDA------>
    <main>
        <section class="container">
            <div class="section-container">
                <h2 class="section-title">Productos Disponibles</h2>
    
            <!--Aquí irá el JavaScript para las tarjetas-->
                <div id="product-list" class="product-list">
                    <article class="product-card">
                        <img src="./img/teclado.png" alt="Imagen de un teclado para pc">
                        <h3>Teclado Gamakay TK101</h3>
                        <p>Teclado mecánico personalizado inalámbrico númerico. Disponible en QWERTY.</p>
                        <span>54,95€</span>
                        <button>Añadir al carrito</button>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <!----FOOTER DE LA TIENDA---->
    <footer>
        <div class="footer-container">
            <div class="socials-links">
                <a href="#" aria-label="Twitter">
                    <svg class="logo-twitter" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 14 14">
                        <g fill="none"><g clip-path="url(#SVGG1Ot4cAD)">
                        <path fill="#ebebeb" d="M11.025.656h2.147L8.482 6.03L14 13.344H9.68L6.294 8.909l-3.87 4.435H.275l5.016-5.75L0 .657h4.43L7.486 4.71zm-.755 11.4h1.19L3.78 1.877H2.504z"/></g><defs>
                        <clipPath id="SVGG1Ot4cAD"><path fill="#fff" d="M0 0h14v14H0z"/></clipPath></defs></g>
                    </svg>
                </a>

                <a href="#" aria-label="Instagram">
                    <svg class="logo-instragam" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <g fill="#ebebeb" stroke="#FF6B35" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8A4 4 0 0 1 16 11.37m1.5-4.87h.01"/></g>
                    </svg>
                </a>

                <a href="#" aria-label="Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 20 20">
                        <path fill="#ebebeb" fill-rule="evenodd" d="M18.896 0H1.104C.494 0 0 .494 0 1.104v17.792C0 19.506.494 20 1.104 20h9.578v-7.745H8.076V9.237h2.606V7.01c0-2.584 1.578-3.99 3.883-3.99c1.104 0 2.052.082 2.329.119v2.7h-1.598c-1.254 0-1.496.596-1.496 1.47v1.927h2.989l-.39 3.018h-2.6V20h5.097c.61 0 1.104-.494 1.104-1.104V1.104C20 .494 19.506 0 18.896 0"/>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <!------JAVASCRIPT------>
    <script src="main.js"></script>
    
</body>
</html>
